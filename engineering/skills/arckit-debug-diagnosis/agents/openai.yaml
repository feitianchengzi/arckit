interface:
  display_name: "ArcKit Debug Diagnosis"
  short_description: "bug 逻辑匹配门禁、.log 埋点确认、必要修复与清理"
  default_prompt: "使用 $arckit-debug-diagnosis 先整理问题表现，再推演相关代码的输入、数据流、状态变化、边界和时序。只有逻辑分析结果能够逐项完整解释问题的触发条件、实际表现、发生位置和时序，与问题表现 100% 匹配时，才直接确认根因；否则必须在关键执行边界添加带唯一标记的临时日志埋点，让应用、测试或脚本在复现路径中把时间、事件、关键状态、关联 ID 和必要结果输出到 arckit/debug/<issue-slug>.log。读取真实运行日志、验证逻辑并排除竞争假设，确认根因后再做必要修复。修复和验证后清理临时埋点及不再需要的日志，并在最终输出或项目已有记录载体中说明逻辑匹配、日志证据、修复、验证和清理结果。"
policy:
  allow_implicit_invocation: true
workflow:
  first_steps:
    - "保护现场：检查工作区、失败输出、最近变更和用户已有改动。"
    - "收敛症状和复现条件，区分现象、解释和已确认事实。"
    - "执行逻辑匹配门禁：逐项判断代码逻辑分析是否与问题表现 100% 匹配。"
    - "未完全匹配时，在关键执行边界添加输出到 arckit/debug/<issue-slug>.log 的临时日志埋点，运行复现路径并分析真实数据。"
    - "根因被观测结果指向后，执行必要修复和回归验证。"
    - "最终前清理临时埋点，搜索唯一标记确认无残留。"
  persistence_rules:
    - "arckit/debug/<issue-slug>.log 承载应用、测试或脚本在复现路径中产生的临时日志埋点数据，用于验证逻辑分析和确认根因。"
    - "问题表现、逻辑分析、根因结论、修复说明和清理状态由最终输出或项目已有 case/pending 等记录载体承载。"
    - "临时 console/log/trace/debug flag 必须有唯一标记，例如 ARC_DEBUG:<issue-slug>。"
    - "保留长期结构化日志时必须说明诊断价值、脱敏边界和为什么不是临时噪声。"
