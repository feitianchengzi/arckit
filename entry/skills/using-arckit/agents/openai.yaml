interface:
  display_name: "Using ArcKit"
  short_description: "软件项目协作的首轮 ArcKit 场景工作流解析和 workflow frame 编译入口"
  default_prompt: "使用 $using-arckit 处理软件项目协作的首轮入口：识别 scenario 和 signals，建立 runtime_situation，调用 $arckit-workflow-memory 做 workflow_resolution，优先绑定已有 accepted/candidate scenario workflow，只有无法匹配时才创建或准备创建场景级 candidate；本次任务只产生 execution_record。把 memory overlay 应用到默认能力地图，编译 workflow_frame，并路由必要的专门 skills。最终产物可以是 code、agent skill、document、workflow 或 mixed artifact；前置流程仍按需求、设计、技术、迭代、治理和验证判断，不因最终产物是 skill 而跳过 $using-arckit。只有纯安装、同步、漂移检查、profile 归类、应用、正式化、共享或发布准备等已明确 agent skill 生命周期治理动作，且没有定义、实现或验证不确定性时，才可直达 ArcForge 类治理能力。用户要求只做评测、模拟真实研发场景、复盘试跑偏差或验证产品方案覆盖时，路由到 $arckit-evaluation，评测结论不直接提升为 spec、tech、任务或 workflow memory。发布、出包、测试分发、应用商店发布、TestFlight、App Store、内测、公测、正式发布或发布候选意图，默认优先选择 $arckit-git-branching，把任务收敛为 release 分支/tag 规范和 git push 远端触发；进入 recommend-git-trigger 时，本轮停止于 Git 状态和 release/tag 可见性检查、推荐基线/tag、说明远端监听 pattern 和等待用户确认；进入 apply-git-trigger 时，只执行已确认的最小 Git 操作并在 push 后停止。不得因为缺少 fastlane、CI、Xcode Cloud 或远端 workflow 文件而切换到本机构建、测试、归档、上传、签名、平台查询或发布实现。远端出包 workflow 失败但只有泛化失败标题、logs/artifacts 不足、没有上传历史或不知道失败原因在哪里看时，也优先选择 $arckit-git-branching 收集失败原因原文；只有用户明确要求发布前 gate、go/no-go、灰度/回滚风险或 readiness 判断时，才选择 $arckit-release-readiness。workflow_frame 必须区分 workflow_resolution、final_goal、current_phase、phase_reason、selected_capabilities、why_not_selected、artifact_targets、reflection_gates、execution_record_target、confirmation_points 和 stop_conditions。进入实现前形成 implementation_handoff，标注 artifact_type: code|skill|document|workflow|mixed|unknown，再选择对应实现 adapter 和验证证据。首轮之后用户继续补充、纠错、换目标、纠正项目事实、回答澄清或暂停时，交给 $arckit-turn-adaptation 分类；任务结束、阻塞或失败时先完成 artifact impact scan，再触发 $arckit-workflow-memory 写 execution_record 和 closeout。项目事实没有变化只影响 artifact 路由，不等于 workflow memory closeout 可以跳过。不要使用会诱导 agent 降低流程完整性的 workflow 修饰词。"
policy:
  allow_implicit_invocation: true
  orchestration_required: true
workflow:
  first_steps:
    - "识别 scenario、signals 和 workflow_source。"
    - "默认调用 arckit-workflow-memory 做 workflow_resolution，不等用户提到 workflow。"
    - "优先绑定项目级 accepted/candidate scenario workflow，再参考用户级 accepted/candidate；无法匹配时才创建或准备创建场景级 candidate。"
    - "生成 runtime_situation，先做 workflow_composition_reasoning，区分 final_goal/current_phase/phase_reason，判断缺口、可用能力、已选能力、跳过原因和下一次重编译条件，再应用 memory overlay 编译 workflow_frame。"
    - "发布、出包、测试分发、应用商店发布、TestFlight、App Store、内测、公测、正式发布或发布候选意图，默认先路由到 arckit-git-branching；远端出包 workflow 失败但缺少具体错误原因时，也先路由到 arckit-git-branching 收集失败原因；不要用 arckit-release-readiness 抢占，除非用户明确要求发布前 gate/go-no-go/readiness。"
    - "当 selected_capabilities 包含 arckit-git-branching 且模式是 recommend-git-trigger 或 apply-git-trigger，本轮 stop condition 必须继承 Git-only 边界：推荐时只做 Git 可见性检查并等待确认，执行时只做已确认的最小 Git 操作并在 push 后停止；不得因缺少 fastlane、CI、Xcode Cloud 或远端 workflow 文件而 fallback 到本机构建、测试、归档、上传、签名、平台查询或发布实现。"
    - "正向实现任务先判断是否建立或强化产品、交互、视觉或技术规范；UI 一致性、跨页面行为/样式统一、组件状态统一或从实现中反推规范变化时，先标记 interaction/visual check，再形成 implementation_handoff。"
    - "最终产物类型不决定前置流程；code、agent skill、document、workflow 或 mixed artifact 都按同一套需求、设计、技术、迭代、治理和验证流程判断。"
    - "implementation_handoff 必须标注 artifact_type: code|skill|document|workflow|mixed|unknown，再选择普通代码工作流、arckit-code、Skill First、skill creator、ArcForge 或其他对应实现 adapter。"
    - "只有纯安装、同步、漂移、profile、应用、正式化、共享或发布准备等已明确 agent skill 治理动作，且没有定义、实现或验证不确定性时，才直达 ArcForge 类治理能力。"
    - "只做评测、模拟真实研发场景、复盘试跑偏差或验证产品方案覆盖时，路由到 arckit-evaluation；评测结论只作为过程产物，确认稳定后再交给下游事实源或治理能力。"
    - "用户在首轮目标之后继续补充、纠正、换目标、纠正项目事实、回答澄清或要求暂停时，交给 arckit-turn-adaptation 分类；不要在 using-arckit 内展开 turn-level 分类细节。"
    - "bug、review、产品定义和技术方案按默认 workflow 组合专门 skill；验证阶段按 artifact_type 收集代码测试、构建日志、真实任务试跑、触发边界、安装状态或治理 diff 等证据。"
    - "任务结束、阻塞或失败时先做 artifact impact scan，再触发 arckit-workflow-memory 写 execution_record 并做 closeout。"
  persistence_rules:
    - "业务代码写入边界不自动禁止 ~/.arckit workflow memory。"
    - "Workflow memory 负责 workflow_resolution、overlay 和 execution_record；命中 scenario workflow 必须绑定到本轮 workflow_frame，并改写或明确不改写本轮 workflow_frame。"
    - "每次任务写 execution_record，不要把每次任务建成新的 workflow；同类场景维护同一个 accepted/candidate workflow。"
    - "能力选择按 final_goal、current_phase、missing_piece、artifact_stability 和 artifact impact 判断，不用场景穷举替代 workflow_composition_reasoning。"
    - "Workflow frame 不是静态清单；必须解释为什么选择或不选择 explore-product-design、interaction、visual、spec、tech、implementation、verification、pending 等基础能力。"
    - "每轮必须扫描 spec、interaction、visual、tech、evaluation、pending、governance、verification 和 workflow_memory 的影响；项目事实没有变化不等于 workflow memory 可以跳过。"
    - "Artifact impact scan 不按任务规模设置特殊分支；必须逐项判断后再给出简洁或展开结果。"
    - "不要使用会诱导 agent 降低流程完整性的 workflow 修饰词；需要控制输出长度时，仍必须保留 workflow_resolution、artifact impact scan 和 closeout 判断。"
    - "目标是代码不等于 interaction/visual skipped；实现 UI 一致性或跨页面统一时，interaction 和 visual 至少先 check，收口时再决定是否 update。"
    - "产品概念和技术方案仍写入目标项目 arckit/spec、arckit/tech 或其他结果事实源。"
