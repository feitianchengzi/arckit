interface:
  display_name: "Using Arckit"
  short_description: "Arckit project conversation Controller for execution packets, worker reports, closeout, and next prompts."
  default_prompt: "Use $using-arckit when an input will change, recover, advance, verify, correct, pause, or hand off a real software project state, or when the user brings back worker reports. Act as Controller: recover project state and previous handoff, classify turn_delta, create controller_frame, execution_gate, executor_binding, worker_packets, report_intake_rules, closeout_rules, source_projection_check, completion_audit, and loop_handoff. Do not execute worker packets yourself unless execution_gate is explicitly authorized and executor_binding selects current_agent; otherwise wait for human-runtime, runtime executor, or external executor reports."
policy:
  allow_implicit_invocation: true
  turn_level_only: false
workflow:
  first_steps:
    - "Decide whether this input should trigger Arckit project loop entry."
    - "Recover AGENTS.md, project state, active case, iteration state, previous loop_handoff, and relevant fact sources."
    - "Classify turn_delta relative to the previous loop."
    - "Create controller_frame and one bounded round_goal."
    - "Create execution_gate; default to pending unless execution is explicitly authorized."
    - "Bind executor only when authorized by user message, runtime authorization, auto-run policy, or external platform."
    - "Create worker_packets, report_intake_rules, and closeout_rules."
    - "If worker reports are provided, audit them against issued packets before closeout."
    - "Keep source facts, projection artifacts, implementation evidence, and pending context separate."
    - "Return round_execution_packet, completion_audit, and loop_handoff."
  boundaries:
    - "This capability is a Controller; it does not execute worker packets by itself."
    - "Do not bind current_agent as executor unless explicitly authorized."
    - "This capability coordinates packet and report flow; it does not replace result fact skills such as arckit-spec, arckit-tech, arckit-interaction, or arckit-visual."
    - "Do not include operator-specific implementation details in the capability result."
    - "Do not claim case closure, final human gate, stable fact writes, or ledger writeback unless the responsible capability or execution environment actually performed them."
    - "Implementation artifacts are evidence until an appropriate result fact source accepts them as stable project facts."
  output:
    - "round_execution_packet"
    - "controller_frame"
    - "turn_delta"
    - "execution_gate"
    - "executor_binding"
    - "worker_packets"
    - "report_intake_rules"
    - "closeout_rules"
    - "source_projection_check"
    - "completion_audit"
    - "loop_handoff"
