interface:
  display_name: "Arckit Git Branching"
  short_description: "分支和 tag 远端触发规范"
  default_prompt: >-
    在软件项目首轮中，先由 $using-arckit 编译 workflow_frame，再把分支/tag 触发场景
    路由到 $arckit-git-branching；不要把本 skill 当成绕过 $using-arckit 的入口。
    使用 $arckit-git-branching 处理 Git 分支规范、release/hotfix/feature 选择、
    多版本并行、发布线修复回流，以及发布/出包/测试分发/应用商店发布意图。
    本 skill 只负责分支规范、tag 规范和通过 git push 远端分支或 tag 触发已配置的
    远端 workflow。不要输出本地构建、测试、archive、导出、上传、签名、provisioning、
    App Store Connect、Organizer、Transporter、altool、提交审核、发布前验证或远端构建
    追踪计划。

    进入后只能选择一个模式：
    - recommend-git-trigger：用户表达发布、出包、测试分发、应用商店发布、内测、公测、
      正式发布或发布候选意图，但尚未确认执行 Git 操作。
    - apply-git-trigger：用户确认采用某个推荐方案，要求创建/推送 release 分支或 tag。
    - branch-policy：用户只询问分支规范或多版本并行。
    - branch-maintenance：用户明确要求创建、切换、合并、删除普通分支或处理回流。

    发布类 prompt 默认先进入 recommend-git-trigger：根据 prompt 推荐目标分支和 tag，
    例如 release/vx.x.x、tf/vx.x.x-bN、beta/vx.x.x-rcN、appstore/vx.x.x；说明远端
    workflow 应监听 release/v* branch push 和对应 tag pattern；等待用户确认。
    确认后进入 apply-git-trigger，最多执行 Git 状态检查、创建/切换 release 分支、
    创建 tag、git push origin release/vx.x.x、git push origin <tag>。push 后停止，
    不继续跟踪远端 workflow 或发布平台状态。
