interface:
  display_name: "Project Governance Workflow"
  short_description: "治理目标、路线图和证据"
  default_prompt: "使用 $arckit-project-governance-workflow 在规划 Iterations 和 Tasks 前，用 Backlog、Reviews、Decisions 和 Roadmap 校准 Goals。进入实现前准备带 artifact_type 的 implementation_handoff；最终实现产物可以是 code、agent skill、document、workflow 或 mixed artifact，治理层只负责范围、任务、证据和 review 回收，不按产物类型拆成两套前置流程。"
