# 组件视觉目录 — {{PROJECT_NAME}}
# 本文件记录可复用组件的视觉规格入口，实际代码在目标平台源码中实现。
# 每当新增或调整组件视觉规格时更新此文件。

metadata:
  project: "{{PROJECT_NAME}}"
  last_updated: "{{DATE}}"
  tokens: "./design-tokens.yaml"

# ─── 组件视觉规格列表 ───
# 格式说明：
#   role:          组件在视觉系统中的角色
#   variants:      视觉变体
#   sizes:         尺寸变体
#   states:        状态集合
#   token_refs:    依赖的 Design Tokens
#   accessibility: 无障碍与对比度要求

components: {}

  # 示例（取消注释并修改）：
