display_name: App Store Listing Assets
short_description: Produce localized App Store Connect text plus upload-ready screenshot and promotional image files from real app evidence.
default_prompt: |
  Use $app-store-listing-assets to prepare App Store submission listing assets.

  First read the app's actual specs, source, existing review notes, target devices, version, and available media. Verify current App Store Connect field limits from official Apple sources when they may have changed.

  Treat Previews and Screenshots as a production deliverable: first ask the user to choose screenshot mode if they have not already specified one. Support automatic mode (simulator/system clicks/screenshots/thumbnails/scripts) and manual mode (write a manual-capture-guide.md telling the user which pages to capture, where to save files, naming rules, dimensions, and completion signal). A shot list without image files is not complete. Use the skill's screenshot-production reference for capture, processing, dimensions, mode selection, manual guidance, manifest requirements, content-rights strategy, and directory layout.

  For screenshot navigation, prefer a low-token loop: capture full-resolution files, create 480-720px-high thumbnails or contact sheets for visual state checks, use fixed simulator click coordinates after calibration, and reserve high-resolution image inspection for final promotional-image QA or unclear failures. Thumbnails are for navigation and state confirmation only, not final quality judgment. If simulator screenshot and system click are known to work, use that as the primary capture loop before designing heavier harnesses.

  Before making final promotional images, choose and record the asset strategy: real-screenshot or real-screenshot-safe-mask. Do not create or recommend concept-promotional screenshots, abstract concept art, AI product illustrations, or fully redrawn UI as App Store screenshots; Apple Guideline 2.3.3 requires screenshots to show the actual app in use. If third-party visual rights are uncertain, keep the real app UI and apply minimal localized masking, blur, color blocks, or generic placeholders only to the risky regions.

  For visual production, split the work into layers: framework/background/device frame, title/subtitle, divider, real screenshot, optional masking overlay, and supplemental effects. Confirm the framework and first image before batch-generating the rest. Once a user confirms a style, only change the requested layer or parameter; do not redraw the whole style when replacing screenshots, changing text, or completing images 2-5.

  For App Review rejections, Guideline 2.1 Information Needed, Resolution Center replies, or App Review Information Notes, generate fact-based review notes from the actual project: physical-device screen recording location, tested devices/OS versions, purpose and audience, access instructions, external services, regional behavior, third-party content rights, permissions, account/payment/UGC state, and any remaining manual confirmations. Keep the response concise enough for App Store Connect field limits, and when the user says it is too long, compress by merging sections and preserving only evidence and risk boundaries. For Bangumi-backed anime metadata, explain that Bangumi developer/API data is used for metadata only, cite https://bangumi.tv/about/copyright when useful, and never claim ownership of anime video/content rights.

  Then produce Chinese and English Promotional Text, Description, and Keywords when listing metadata is requested. Do not claim features that are not evidenced in the project. Write outputs under the requested project path, defaulting to arckit/app-store-submission/. Report generated image paths, sizes, localization coverage, manifest path, field-limit checks, App Review Notes/reply text if generated, and any manual follow-up. If screenshots cannot be generated, mark the task blocked_missing_screenshots rather than complete.
