interface:
  display_name: "ArcKit Workflow Memory"
  short_description: "默认维护 Arckit 工作流信号、候选和已确认工作流记忆"
  default_prompt: "使用 $arckit-workflow-memory 在每个 Arckit 任务开始时检查用户级/项目级 workflow memory：必须先读取相关 INDEX.md 内容，再按索引读取匹配的 accepted/candidate workflow patches；索引缺失、过期或未列出已有文件时扫描目录兜底并报告 index_status。向 using-arckit 输出 memory overlay 及其预期改写项。任务结束时消费最终 workflow_frame、执行结果和可选 workflow_correction_ledger 做 signal_decision，并输出 workflow_memory_closeout：correction_detected、signal_decision、skip_reason；只有有学习价值时记录 workflow signal。本 skill 不负责原始消息分类；using-arckit 只判断首轮入口和后续交接，后续消息分类由 arckit-turn-adaptation 完成。输入包含 workflow_correction_ledger，且 ledger 表明用户改变后续验证方式、声明当前项目偏好、要求以后按某种方式执行、指出为什么没有学习/为什么跳过或改变 frame 时，优先记录为 workflow-level signal，抽象成编排启发式、adaptation_triggers、final_goal/current_phase、验证强度、停止条件和 workflow_patch_shape，不写成固定模板流程；skip 禁止使用，除非存在完全匹配的 accepted patch 或用户明确说不要记录。scope_hint=current_project 或 scope=project 时默认写入 ~/.arckit/workflows/projects/<project-fingerprint>/，只有无法稳定计算项目指纹或项目级目录不可写时才可降级到 user scope 并说明原因。命中 candidate patch 且无新信息时轻量更新 candidate；命中 accepted patch 且完全按预期成功、无纠偏、无失败、无新增模式时 skip。把 pending signals 保留在当前会话 buffer 中，第二条相似 signal 后必须输出 candidate written、candidate_pending_write 或 candidate_blocked；写入或更新 signal/candidate/accepted 后必须同步 INDEX.md，不能只写 YAML 文件；只有用户确认后才提升为 accepted workflow patch。"
policy:
  allow_implicit_invocation: true
  default_from_using_arckit: true
workflow:
  phases:
    - "memory_check: 先读取 user/project INDEX.md 内容，再按索引匹配 accepted 与 candidates；索引缺失或不完整时扫描目录兜底。"
    - "frame_contribution: 为 using-arckit 的 workflow_frame 提供 memory overlay，并说明预期改写的 skill、handoff、artifact scan、reflection gate、确认点或 closeout 策略。"
    - "signal_decision: 每个 Arckit 任务结束时必须得到 write_signal、update_candidate_only 或 skip 三选一，并输出 correction_detected、signal_decision、skip_reason；目录不存在且可写时直接初始化，只有权限不足且需要写入时生成 bootstrap pending write。"
    - "candidate_maintenance: 维护 pending_signal_buffer；相似性包括 scenario、skill 链、任务输入、用户纠偏/适配触发器、final_goal/current_phase 是否分离、workflow_patch_shape 和验证形态；第二条相似 signal 后必须创建或更新 candidate patch，不能只报告 signal pending；candidate 写入或更新后同步 INDEX.md。"
    - "index_maintenance: signal、candidate patch 或 accepted workflow patch 写入后必须维护 INDEX.md；无法维护时输出 workflow_index_pending_write 或 workflow_index_blocked。"
    - "acceptance: 只有用户确认后才写 accepted workflow patch。"
  boundaries:
    - "不负责原始用户消息分类；using-arckit 只判断首轮入口和后续交接，补充、纠错、目标变更和暂停由 arckit-turn-adaptation 分类。"
    - "不要把一次任务直接提升为 accepted workflow patch。"
    - "Workflow memory 记录编排启发式和 frame 改写方式，不记录“某类任务必须永远 A->B->C”的固定方案。"
    - "产品概念、技术方案和项目事实不写入 workflow memory。"
    - "~/.arckit/workflows 是基础运行状态目录，首次初始化不需要产品确认；沙箱或工具无权限时才请求权限。"
    - "业务代码只改目标目录不等于禁止 workflow memory；明确禁止或拒绝后才输出 blocked。"
    - "用户纠正流程选择、改变后续验证方式、声明当前项目偏好、要求以后按某种方式执行，或指出为什么没有学习/为什么跳过时，不能 skip；除非完全匹配 accepted patch 或用户明确不要记录。"
    - "例如当前项目写完代码后只自查、不编译、由用户人工编译，应按 verification/stop condition、current_project、write_signal 处理；单条证据不直接 accepted。"
    - "scope_hint=current_project 或 scope=project 时写项目级 workflows/projects/<project-fingerprint>；不能无说明写到 user/signals。"
    - "第三条相似 signal 后仍未输出 candidate 状态时，必须报告 workflow memory 收口失败。"
    - "INDEX.md 是导航索引；不能因为索引没列 candidate 就判定无匹配，也不能写入 candidate 后漏更新索引。"
