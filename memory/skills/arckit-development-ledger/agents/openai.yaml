display_name: ArcKit Development Ledger
short_description: 维护 arckit/project 下的 canonical 项目/迭代状态、生成式 decision brief、arckit/cases 研发事项证据和可续轮 loop handoff。
default_prompt: 使用 $arckit-development-ledger 创建、读取、迁移、渲染、校验、审计和更新目标项目的 project_state_record、STATE.md loop decision brief、iteration_state_record、iteration decision brief、development_case_record、state delta、completion audit、loop_handoff 和状态索引；*.record.json 是权威结构化状态，Markdown 是有损决策投影，不是追加日志或第二事实源。每轮 closeout 必须先判断下一步职责归属 next_responsibility=agent|human|external|none，再判断触发方式 trigger_mode=manual_bridge|auto_bridge|user_decision|external_wait|none；manual_bridge 只表示当前缺少自动续轮机制、由人手动触发本应由 agent 继续的下一轮，不等于 human_decision_required。只有审美判断、商业取舍、产品确认、权限授权、破坏性操作确认或发布责任才写 next_responsibility=human 和 human_decision_required=true。agent 可继续时必须提供 next_prompt、agent_instruction、required_checks 和 progress_guard，便于人工桥或未来自动桥消费。
